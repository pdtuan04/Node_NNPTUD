<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO chat</title>
    <style>
        body {
            margin: 0;
            padding-bottom: 3rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #form {
            background: rgba(0, 0, 0, 0.15);
            padding: 0.25rem;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            height: 3rem;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        #input {
            border: none;
            padding: 0 1rem;
            flex-grow: 1;
            border-radius: 2rem;
            margin: 0.25rem;
        }

        #input:focus {
            outline: none;
        }

        #form>button {
            background: #333;
            border: none;
            padding: 0 1rem;
            margin: 0.25rem;
            border-radius: 3px;
            outline: none;
            color: #fff;
        }

        #messages {
            list-style-type: none;
            margin: 0;
            padding: 0;
        }

        #messages>li {
            padding: 0.5rem 1rem;
        }

        #messages>li:nth-child(odd) {
            background: #efefef;
        }
    </style>
</head>

<body>
    <div>
        <input type="text" id="jwt_txt"
            value="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjY5Y2I4MDM0ZWVhZDlmNmZkMTJkNDE4MSIsImlhdCI6MTc3NDk0NjM5NywiZXhwIjoxNzc1MDMyNzk3fQ._6vvTHhCm388wCAwPZIj2zdKLgY8_kZ5YbuE70u5oSY">
        <input type="button" value="getUser" onclick="getUser()">
        <p id="user"></p>
    </div>
    <div>
        <input type="text" id="userid_txt" value="69cb7ffaeead9f6fd12d4174">
        <input type="button" value="getMessage" onclick="getMessage()">
        <p id="user"></p>
    </div>
    <ul id="messages"></ul>
    <form id="form" action="">
        <input id="input" autocomplete="off" /><button>Send</button>
    </form>
</body>
<script src="/socket.io/socket.io.js"></script>
<script>
    var socket;
    function getUser() {
        let jwt = document.getElementById('jwt_txt').value;
        socket = io({
            auth: {
                token: jwt
            }
        });
        socket.on('welcome', msg => {
            document.getElementById('user').innerHTML = msg
        })
        socket.on('newMessage', msg => {
            getMessage();
        })
    }
    async function getMessage() {
        let jwt = document.getElementById('jwt_txt').value;
        let user02 = document.getElementById('userid_txt').value;
        socket.emit('joinUser', user02);
        let res = await fetch('http://localhost:3000/api/v1/messages/' + user02, {
            headers: {
                "authorization": "Bearer " + jwt
            }
        })
        let messages = await res.json()
        document.getElementById('messages').innerHTML = '';
        for (const message of messages) {
            document.getElementById('messages').innerHTML +=
                `<li>${message.from.username}: ${message.messageContent.text}</li>`
        }
        return false;
    }
    document.getElementById('form').addEventListener('submit', async e => {
        e.preventDefault()
        let jwt = document.getElementById('jwt_txt').value;
        let user02 = document.getElementById('userid_txt').value;
        let text = document.getElementById('input').value;
        let newMessage = {
            to: user02,
            text: text
        }
        let res = await fetch('http://localhost:3000/api/v1/messages', {
            method: 'POST',
            headers: {
                "authorization": "Bearer " + jwt,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(newMessage)
        })
        if (res.ok) {
            let data = await res.json();
            await getMessage()
            document.getElementById('input').value = "";
            socket.emit('newMessage', data);
        }
        
    })
</script>

</html>
